<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D57"/>
      <stop offset="100%" stop-color="#1A5C3E"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0B75A"/>
      <stop offset="100%" stop-color="#E8A84E"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  <!-- Amber accent bar at top -->
  <rect x="18" y="14" width="64" height="5" rx="2.5" fill="url(#accentGrad)" opacity="0.9"/>
  <!-- EN monogram -->
  <text
    x="50"
    y="71"
    text-anchor="middle"
    font-family="'Plus Jakarta Sans', 'Inter', ui-sans-serif, system-ui, sans-serif"
    font-weight="800"
    font-size="42"
    fill="white"
    letter-spacing="-1"
  >EN</text>
  <!-- Subtle underline dot -->
  <circle cx="50" cy="84" r="3.5" fill="url(#accentGrad)" opacity="0.8"/>
</svg>
